<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f72585"/>
      <stop offset="100%" stop-color="#b5179e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
  </defs>

  <!-- Outer hexagon (benzene ring) -->
  <polygon points="200,30 270,65 270,135 200,170 130,135 130,65"
           fill="none" stroke="url(#primary)" stroke-width="4" stroke-linejoin="round"/>

  <!-- Inner hexagon -->
  <polygon points="200,55 250,78 250,122 200,145 150,122 150,78"
           fill="none" stroke="url(#primary)" stroke-width="2" stroke-linejoin="round" opacity="0.6"/>

  <!-- Double bond indication -->
  <line x1="155" y1="88" x2="170" y2="95" stroke="url(#accent)" stroke-width="2.5"/>
  <line x1="230" y1="105" x2="245" y2="112" stroke="url(#accent)" stroke-width="2.5"/>
  <line x1="200" y1="45" x2="200" y2="58" stroke="url(#accent)" stroke-width="2.5"/>

  <!-- Electron orbit 1 -->
  <ellipse cx="200" cy="100" rx="68" ry="22" fill="none" stroke="url(#accent)" stroke-width="1.5"
           stroke-dasharray="4,4" transform="rotate(25,200,100)" opacity="0.5"/>
  <!-- Electron orbit 2 -->
  <ellipse cx="200" cy="100" rx="68" ry="22" fill="none" stroke="url(#accent)" stroke-width="1.5"
           stroke-dasharray="4,4" transform="rotate(-30,200,100)" opacity="0.5"/>

  <!-- Electrons -->
  <circle cx="225" cy="75" r="4.5" fill="url(#accent)"/>
  <circle cx="178" cy="128" r="4.5" fill="url(#accent)"/>
  <circle cx="148" cy="80" r="4.5" fill="url(#accent)"/>

  <!-- Text -->

  <text x="200" y="225" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="600" fill="#555" text-anchor="middle" letter-spacing="6">MUNDO DOS</text>

  <text x="200" y="270" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="40" font-weight="900" fill="url(#textGrad)" text-anchor="middle" letter-spacing="3">ISÔMEROS</text>

  <text x="200" y="305" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#888" text-anchor="middle" letter-spacing="4">SOFTWARE EDUCATIVO · QUÍMICA ORGÂNICA</text>
</svg>
