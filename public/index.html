<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" integrity="sha512-E8QSvWZ0eCLGk4km3hxSsNmGWbLtSCSUcewDQPQWZF6pEU8GlT8a5fF32wOl1i8ftdMhssTrF/OhyGWwonTcXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.0/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3287330373225133"
     crossorigin="anonymous"></script>

    <link rel="icon" href="./favicon.png">
    <title>Mundo dos Isômeros</title>
  </head>
  <body>
    <div class="particles" id="particles"></div>
    <form class="container-menu">
      <img class="menu-icon" src="./favicon.png" alt="atom icon">
      <h1 class="menu-text">Bem-vindo ao<br><strong>Mundo dos Isômeros</strong></h1>
      <input class="menu-input" type="text" maxlength="8" placeholder="Digite seu nome" autofocus>
      <button class="menu-button disable" type="button">Iniciar</button>
    </form>

    <table class="container-leaderboard">
      <caption class="leaderboard-title">Leaderboard</caption>
      <colgroup>
        <col></col>
        <col class="col-name"></col>
      </colgroup>
      <thead class="leaderboard-head">
        <tr>
          <th>Rank</th>
          <th>Nome</th>
          <th>Nível 1</th>
          <th>Nível 2</th>
          <th>Nível 3</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody class="leaderboard-body"></tbody>
      <tfoot class="leaderboard-foot">
        <tr>
          <td colspan="6">Your Rank</td>
        </tr>
        <tr>
          <td>-</td>
          <td>--------</td>
          <td>-----</td>
          <td>-----</td>
          <td>-----</td>
          <td>-----</td>
        </tr>
      </tfoot>
    </table>

    <script src="./script.js" type="module"></script>
    <script>
      const container = document.getElementById('particles')
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div')
        p.className = 'particle'
        p.style.left = Math.random() * 100 + '%'
        p.style.animationDuration = (4 + Math.random() * 8) + 's'
        p.style.animationDelay = Math.random() * 8 + 's'
        p.style.width = p.style.height = (1 + Math.random() * 2) + 'px'
        container.appendChild(p)
      }
    </script>
  </body>
</html>
